name: Build and Scan Container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version from git
        id: get-version
        run: |
          VERSION=$(git describe --tags 2>/dev/null || echo "dev")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: local-image:test
          build-args: |
            VERSION=${{ steps.get-version.outputs.VERSION }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local-image:test
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Parse scan results
        id: parse
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-report.json 2>/dev/null)
          LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-report.json 2>/dev/null)
          TOTAL=$(( CRITICAL + HIGH + MEDIUM + LOW ))
          echo "CRITICAL=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "HIGH=${HIGH}" >> $GITHUB_OUTPUT
          echo "MEDIUM=${MEDIUM}" >> $GITHUB_OUTPUT
          echo "LOW=${LOW}" >> $GITHUB_OUTPUT
          echo "TOTAL=${TOTAL}" >> $GITHUB_OUTPUT

      - name: Generate scan report
        id: report
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          CRITICAL="${{ steps.parse.outputs.CRITICAL }}"
          HIGH="${{ steps.parse.outputs.HIGH }}"
          MEDIUM="${{ steps.parse.outputs.MEDIUM }}"
          LOW="${{ steps.parse.outputs.LOW }}"
          TOTAL="${{ steps.parse.outputs.TOTAL }}"
          printf '%s\n' \
            "# Trivy Scan Results" \
            "" \
            "- **Version**: \`${VERSION}\`" \
            "- **Date**: ${DATE}" \
            "" \
            "| Severity | Count |" \
            "|----------|-------|" \
            "| Critical | ${CRITICAL} |" \
            "| High | ${HIGH} |" \
            "| Medium | ${MEDIUM} |" \
            "| Low | ${LOW} |" \
            "| **Total** | **${TOTAL}** |" \
            "" \
            "> Trivy scan: ${TOTAL} vulns (${CRITICAL} critical, ${HIGH} high, ${MEDIUM} medium, ${LOW} low)" > scan_results.md
          echo "SHORT_SUMMARY=Trivy scan: ${TOTAL} vulns (${CRITICAL} critical, ${HIGH} high, ${MEDIUM} medium, ${LOW} low)" >> $GITHUB_OUTPUT

      - name: Upload Trivy report
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        with:
          name: scan-results
          path: scan_results.md

